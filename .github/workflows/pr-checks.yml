name: PR Checks

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    environment: .env
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗 Build
        run: npm run build
        env:
          CI: false
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_TODOS_COLLECTION_ID: ${{vars.APPWRITE_TODOS_COLLECTION_ID}}

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  test:
    name: Playwright Tests
    needs: build
    runs-on: ubuntu-latest
    environment: .env
    env:
      CI: true
      APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
      PORT: ${{vars.PORT}}
      TEST_USER_EMAIL: ${{vars.TEST_USER_EMAIL}}
      TEST_USER_PASSWORD: ${{vars.TEST_USER_PASSWORD}}

    steps:
      - name: 🔍 Debug environment
        run: |
          echo "TEST_USER_EMAIL set: $([ -n "$TEST_USER_EMAIL" ] && echo 'YES' || echo 'NO')"
          echo "TEST_USER_PASSWORD set: $([ -n "$TEST_USER_PASSWORD" ] && echo 'YES' || echo 'NO')"
          echo "First 5 chars of email: ${TEST_USER_EMAIL:0:5}"

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: 📥 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run Playwright tests
        run: npm run test:e2e

      - name: 📊 Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 30
